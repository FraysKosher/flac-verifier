<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLAC Verifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0f0f0d;
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Page fade-out */
    body { animation: pageOut 0.35s ease forwards 2100ms; }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    /* ─── Bars ─────────────────────────────────────────── */
    .bars {
      position: relative;
      display: flex;
      align-items: flex-end;
      gap: 5px;
      height: 80px;
    }

    .bar {
      width: 8px;
      background: #ffffff;
      border-radius: 3px 3px 0 0;
      transform-origin: bottom center;
      animation: growUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .bar:nth-child(1) { height: 28px; animation-delay:   0ms; }
    .bar:nth-child(2) { height: 44px; animation-delay:  80ms; }
    .bar:nth-child(3) { height: 60px; animation-delay: 160ms; }
    .bar:nth-child(4) { height: 36px; animation-delay: 240ms; }
    .bar:nth-child(5) { height: 52px; animation-delay: 320ms; }

    /* ─── Checkmark ────────────────────────────────────── */
    .check {
      position: absolute;
      right: -4px;
      bottom: -4px;
    }
    .check polyline {
      stroke-dasharray: 32;
      stroke-dashoffset: 32;
      animation: drawCheck 0.35s ease forwards 500ms;
    }

    /* ─── Text ─────────────────────────────────────────── */
    .name {
      color: #ffffff;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.01em;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 0.3s ease forwards 550ms;
    }

    .subtitle {
      color: #4f98a3;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: -10px;
      opacity: 0;
      animation: fadeIn 0.3s ease forwards 750ms;
    }

    /* ─── Keyframes ────────────────────────────────────── */
    @keyframes growUp {
      from { transform: scaleY(0); opacity: 0; }
      to   { transform: scaleY(1); opacity: 1; }
    }
    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes pageOut {
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <!-- teal checkmark -->
      <svg class="check" width="24" height="18" viewBox="0 0 24 18" fill="none">
        <polyline
          points="2,10 8,16 22,2"
          stroke="#4f98a3"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </div>

    <p class="name">FLAC Verifier</p>
    <p class="subtitle">Authenticity Analyzer</p>
  </div>
</body>
</html>
